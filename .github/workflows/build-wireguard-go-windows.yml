name: build-wireguard-go-windows
on:
  workflow_dispatch:
  workflow_call:
  pull_request:
    paths:
      - "wireguard/**"
      - ".github/workflows/build-wireguard-go-windows.yml"

env:
  CARGO_TERM_COLOR: always
  AGENT_ISSELFHOSTED: 1 # https://github.com/actions/setup-go/issues/432

jobs:
  build:
    runs-on: "custom-windows-11"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: "**/go.sum"

      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup msys2
        uses: msys2/setup-msys2@v2
        id: msys2
        with:
          update: false
          msystem: MINGW64
          install: mingw-w64-x86_64-clang

      - name: Install GNU make
        run: |
          winget list GnuWin32.Make || winget install --disable-interactivity --id GnuWin32.Make
          echo "${env:ProgramFiles(x86)}\GnuWin32\bin" | Out-File -FilePath "$env:GITHUB_PATH" -Append

      - name: Build wireguard
        env:
          MSYS2_LOCATION: ${{ steps.msys2.outputs.msys2-location }}
        working-directory: nym-vpn-core
        run: make -f Windows.mk libwg CPU_ARCH=amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wireguard-go_x86_64-pc-windows-msvc
          path: |
            build/lib/x86_64-pc-windows-msvc
          retention-days: 1
